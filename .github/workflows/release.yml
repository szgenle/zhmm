name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: zhmm-macos
            gui-out: dist/zhmm.app
            cli-out: dist/zhmm_cmd
          - os: windows-latest
            artifact-name: zhmm-windows
            gui-out: dist/zhmm.exe
            cli-out: dist/zhmm_cmd.exe
          - os: ubuntu-latest
            artifact-name: zhmm-linux
            gui-out: dist/zhmm
            cli-out: dist/zhmm_cmd

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install deps
        run: poetry install --with dev --no-interaction

      - name: Install Qt runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libgl1

      - name: Update version
        run: poetry run python scripts/update_version.py

      - name: Build GUI (PyInstaller)
        shell: bash
        run: |
          poetry run pyinstaller --onefile --windowed --name "zhmm" \
            --collect-all certifi \
            zhmm/main.py \
            --paths zhmm/

      - name: Build CLI (PyInstaller)
        shell: bash
        run: |
          poetry run pyinstaller --onefile --name "zhmm_cmd" \
            --collect-all certifi \
            zhmm/cmd_main.py \
            --paths zhmm/

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "macOS" ]; then
            ditto -c -k --sequesterRsrc --keepParent dist/zhmm.app artifacts/zhmm-macos.zip
            cp dist/zhmm_cmd artifacts/zhmm_cmd-macos
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/zhmm.exe artifacts/zhmm-windows.exe
            cp dist/zhmm_cmd.exe artifacts/zhmm_cmd-windows.exe
          else
            cp dist/zhmm artifacts/zhmm-linux
            cp dist/zhmm_cmd artifacts/zhmm_cmd-linux
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create SHA256 checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
