name: 💡 Feature Request
description: 提交一个新功能建议 / Suggest a new feature
title: "[Feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议！请先描述**用户场景**，再给出候选方案。

  - type: textarea
    id: problem
    attributes:
      label: 你要解决什么问题 / What problem are you trying to solve?
      placeholder: "我在...场景下，希望能...以便..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案 / Proposed solution
      description: 可以是大致思路，也可以是具体的交互/API 设计。

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives considered

  - type: textarea
    id: extra
    attributes:
      label: 其它信息 / Additional context
