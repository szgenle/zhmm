name: 🐛 Bug Report
description: 报告一个 bug / Report a reproducible bug
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 bug 报告！**请不要在此处粘贴真实账号、密码、OpenID 或云凭据。**
        Thanks for taking the time to file a bug! **Please do NOT paste real passwords, OpenIDs, or cloud credentials here.**
        如果涉及安全漏洞，请改走 [SECURITY.md](../blob/main/SECURITY.md) 的私下披露流程。

  - type: checkboxes
    id: prereqs
    attributes:
      label: 前置检查 / Prerequisites
      options:
        - label: 我已在 Issues 中搜索过是否有相同问题 / I have searched existing issues
          required: true
        - label: 我使用的是最新发行版或 main 分支 / I am on the latest release or `main`
          required: true
        - label: 我确认本 Issue 不涉及安全漏洞 / This is not a security vulnerability
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述 / Describe the bug
      description: 清晰、简洁地描述问题。
      placeholder: "点击登录按钮后，应用崩溃且没有错误提示..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Steps to reproduce
      description: |
        请提供尽可能小的复现步骤。
      placeholder: |
        1. 启动 `zhmm`
        2. 输入 OpenID `test` 与主密码
        3. 点击「登录」
        4. 观察到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为 / Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: zhmm 版本 / Version
      placeholder: "0.1.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统 / OS
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python 版本 / Python version
      placeholder: "3.11.8"

  - type: dropdown
    id: mode
    attributes:
      label: 使用形态 / Mode
      options:
        - GUI
        - CLI
        - Both
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志 / Logs
      description: "请粘贴 `.log/` 下的相关片段。**记得先脱敏！**"
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: 其它信息 / Additional context
